# Verify (stagecraft spec 002): build the app shell and run its test gauntlet
# in CI, the same builds a stamped app's toolchain performs. The
# governance-native addon (spec 008) is built from source (napi/cargo); the
# Encore toolchain and the hiqlite addon resolve as prebuilt binaries from the
# pinned @enrahitu/* packages (no vendored runtime build, no protoc). The
# CoreLedger Postgres-driver arm auto-skips here; its CI coverage lands with
# spec 003 (Postgres adoption).
name: verify
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            addon/governance-native/package-lock.json
            frontend/package-lock.json
      - name: Cache cargo (governance-native addon)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            addon/governance-native/target
          key: cargo-${{ runner.os }}-${{ hashFiles('addon/governance-native/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - run: npm ci
      - run: npm --prefix frontend ci
      - name: Build governance-native addon
        run: npm run build:addon
      - name: Build web (SPA into backend/web/dist)
        run: npm run build:web
      - name: Build app (generates encore.gen)
        run: npm run build:app
      - name: Typecheck and test
        run: npm run typecheck && npm test
