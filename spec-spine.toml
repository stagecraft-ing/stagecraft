# spec-spine.toml governs this repository. All keys are optional; an
# absent file behaves as the defaults for a single-Cargo-workspace repo.

[manifest]
metadata_namespace = "spec-spine"

[domains]
allowed = []   # empty: the `domain` field is free-text / disabled

[kind]
allowed = []   # empty: the `kind` field is free-text / disabled

[layout]
specs_dir     = "specs"
derived_dir   = ".derived"
standards_dir = "standards/spec"
# The governance napi addon (spec 008) is a standalone Rust crate and npm
# package: no root Cargo workspace or npm workspace exists in this repo yet
# (the app shell, spec 002, brings the root package.json). Its manifests carry
# the spec-spine key -> 008.
standalone_rust_workspaces = ["addon/governance-native"]
standalone_npm_packages    = ["addon/governance-native"]

[index]
# Governance surfaces beyond the always-hashed core. Service manifests are
# added as services land (spec 001 §3 service map).
extra_hashed_inputs = [
  "standards/**",
  ".github/workflows/**",
  ".claude/agents/**",
  ".claude/rules/**",
  ".claude/skills/**",
  ".claude/settings.json",
  ".mcp.json",
]

[coupling]
waiver_keyword = "Spec-Drift-Waiver:"
bypass_prefixes = ["**/README.md"]
