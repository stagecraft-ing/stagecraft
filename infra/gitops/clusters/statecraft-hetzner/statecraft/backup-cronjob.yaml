# The /data backup (spec 009 section 4.3 rule 2).
#
# The volume must be backed up before the platform carries anything real,
# because nothing in this repository can re-found it. rauthy's own S3 backup
# path is not wired into the image (spec 009 section 4.8 item 2), so this is
# the interim volume-level mechanism.
#
# CREDENTIALS ARE THE PLATFORM'S OWN, NOT THE FLEET'S. Spec 009 section 4.3
# rule 2 originally proposed reusing FLEET_S3_* and the fleet restic password.
# That was rejected on 2026-07-20: those protect tenant app volumes and travel
# with the placement path, and encrypting the platform's identity plane under
# a repository password whose blast radius is every tenant is the wrong trade
# for the one artifact that cannot be rebuilt. Hence PLATFORM_S3_*, its own
# bucket, and its own Secret mounted only here, never on the app pod.
#
# TWO LIMITATIONS, RECORDED RATHER THAN HIDDEN:
#
# 1. This is a CRASH-CONSISTENT copy, not a quiesced one. restic reads /data
#    while rauthy's hiqlite is live, so a restored snapshot is equivalent to
#    pulling power at that instant. That is usually recoverable and is not
#    nothing, but it is weaker than a real backup. The fleet solves the same
#    problem by scaling the workload to 0 first, which is not available to the
#    control plane: scaling it to 0 is a platform outage. A genuinely
#    consistent backup needs rauthy's native hiqlite S3 backup (the chassis
#    gap above), and that is the real fix.
#
# 2. The PVC is ReadWriteOnce, so this Job must land on the same node as the
#    app pod to attach at all. The podAffinity below is required, not
#    preferred, so a scheduling failure is a visibly failed Job rather than a
#    backup that silently never runs.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: statecraft-data-backup
  namespace: statecraft-system
  labels:
    statecraft.spec: "009-control-plane-deploy"
spec:
  # 02:30 UTC daily.
  schedule: "30 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  # A missed window must surface, not be quietly skipped.
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            fsGroup: 1000
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: statecraft
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: restic
              image: restic/restic:0.17.3
              env:
                - name: RESTIC_REPOSITORY
                  value: "s3:https://nbg1.your-objectstorage.com/statecraft-platform-backup/control-plane"
                # restic's own CLI contract. The operator-facing name is
                # PLATFORM_S3_RESTIC_PASSWORD; restic reads RESTIC_PASSWORD,
                # and that translation happens here rather than by renaming
                # what restic expects.
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: statecraft-platform-backup
                      key: PLATFORM_S3_RESTIC_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: statecraft-platform-backup
                      key: PLATFORM_S3_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: statecraft-platform-backup
                      key: PLATFORM_S3_SECRET_ACCESS_KEY
              command:
                - /bin/sh
                - -ec
                - |
                  # `restic cat config` exits non-zero when the repository is
                  # absent; create it on first run only.
                  restic cat config >/dev/null 2>&1 || restic init
                  restic backup /data --tag control-plane --host statecraft
                  # Keep a window long enough to notice a bad backup before it
                  # ages out. Pruning is part of forget so the bucket does not
                  # grow without bound.
                  restic forget --tag control-plane \
                    --keep-daily 7 --keep-weekly 4 --keep-monthly 6 --prune
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: statecraft-data
                readOnly: true
